<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алкобуфет</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6600">
    <style>
        body {
            margin: 0;
            padding: 1.5rem;
            font-family: system-ui, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 0.8rem auto;
            padding: 1rem;
            border: none;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn-order { background: #ff6600; }
        .btn-order:active { background: #e55d00; }
        .btn-phone { background: #4CAF50; }
        .btn-phone:active { background: #43a047; }

        #installBtn {
            background: #fff;
            color: #000;
            font-size: 1.4rem;
            margin: 2rem auto 1rem;
            border: 2px solid #ff6600;
            display: none;
        }
        #installBtn.show {
            display: block;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #222;
            padding: 1.5rem;
            border-radius: 16px;
            max-width: 300px;
            width: 90%;
            text-align: left;
            color: #fff;
        }
        .modal-content h3 {
            margin: 0 0 1rem;
            color: #ff6600;
            text-align: center;
        }
        .modal-close {
            background: transparent;
            color: #aaa;
            border: none;
            font-size: 1.5rem;
            position: absolute;
            top: 0.5rem;
            right: 0.8rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-content {
            position: relative;
        }
        .phone-option {
            display: block;
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            background: #333;
            border: none;
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .phone-option:active {
            background: #444;
        }
        .modal-close-btn {
            display: block;
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.8rem;
            background: #ff6600;
            border: none;
            color: #fff;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="logo">🔥 АЛКОБУФЕТ</div>

    <!-- Кнопка установки -->
    <button id="installBtn" class="btn">📲 Установить приложение</button>

    <a class="btn btn-order" href="https://taplink.cc/alkobufet.shashlik" target="_blank" rel="noopener noreferrer">Выбрать и заказать</a>
    <button class="btn btn-phone" onclick="document.getElementById('phoneModal').classList.add('active')">📞 Позвонить</button>

    <!-- Модальное окно выбора телефона -->
    <div id="phoneModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="document.getElementById('phoneModal').classList.remove('active')">&times;</button>
            <h3>📞 Выберите место</h3>
            <div id="phonesList">
    <a href="tel:+79099909310" class="phone-option">Павелецкая</a>
    <a href="tel:+79152776884" class="phone-option">Сретенка</a>
    <a href="tel:+79168052630" class="phone-option">Пятницкая</a>
    <a href="tel:+79629459549" class="phone-option">Маяковская</a>
    <a href="tel:+79258005254" class="phone-option">Кутуза</a>
</div>
            <button class="modal-close-btn" onclick="document.getElementById('phoneModal').classList.remove('active')">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно инструкции для iOS -->
    <div id="iosModal" class="modal">
        <div class="modal-content">
            <h3>📱 Как установить на iPhone</h3>
            <ol>
                <li>Нажмите кнопку <strong>«Поделиться»</strong> внизу экрана (квадрат со стрелкой).</li>
                <li>Прокрутите список и выберите <strong>«На экран «Домой»»</strong>.</li>
                <li>Нажмите <strong>«Добавить»</strong> в верхнем правом углу.</li>
            </ol>
            <button class="modal-close-btn" onclick="document.getElementById('iosModal').classList.remove('active')">Понятно</button>
        </div>
    </div>

    <script>
        const installBtn = document.getElementById('installBtn');
        const iosModal = document.getElementById('iosModal');
        let deferredPrompt;

        function isStandalone() {
            return window.matchMedia('(display-mode: standalone)').matches 
                || navigator.standalone 
                || document.referrer.includes('android-app://');
        }

        if (isStandalone()) {
            installBtn.style.display = 'none';
        } else {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.classList.add('show');
            });

            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`Установка: ${outcome}`);
                    deferredPrompt = null;
                    installBtn.classList.remove('show');
                } else {
                    iosModal.classList.add('active');
                }
            });

            window.addEventListener('appinstalled', () => {
                installBtn.classList.remove('show');
                deferredPrompt = null;
            });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
        if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Новый воркер готов, можно предложить перезагрузку
                    if (confirm('Доступна новая версия приложения. Обновить?')) {
                        window.location.reload();
                    }
                }
            });
        });
    });
}
    </script>
</body>
</html>
