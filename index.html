<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алкобуфет</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6600">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }
        .btn {
            display: block;
            width: 85%;
            max-width: 320px;
            margin: 0.8rem auto;
            padding: 1rem;
            border: none;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            color: #fff;
            background: #ff6600;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn:active { background: #e55d00; }
        .btn-phone { background: #4CAF50; }
        .btn-phone:active { background: #43a047; }

        #installBtn {
            background: #fff;
            color: #000;
            margin-top: 2rem;
            display: none; /* будет показана через JS */
        }
        #installBtn.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="logo">🔥 АЛКОБУФЕТ</div>
    <a class="btn" href="https://taplink.cc/alkobufet.shashlik" target="_blank" rel="noopener noreferrer">Выбрать и заказать</a>
    <a class="btn btn-phone" href="tel:+79991234567">📞 Позвонить</a>

    <!-- КНОПКА УСТАНОВКИ (появляется автоматически) -->
    <button id="installBtn" class="btn">📲 Установить приложение</button>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        // Событие от браузера: можно показать кнопку установки
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('show'); // показываем кнопку
        });

        // Обработчик клика по кнопке
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`Установка: ${outcome}`);
            deferredPrompt = null;
            installBtn.classList.remove('show'); // скрываем после показа диалога
        });

        // Когда приложение УЖЕ установлено — скрываем кнопку
        window.addEventListener('appinstalled', () => {
            installBtn.classList.remove('show');
            deferredPrompt = null;
        });

        // Регистрируем Service Worker для офлайн-режима
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
